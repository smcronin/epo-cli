name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist
          bin_name="epo_${GOOS}_${GOARCH}"
          bin_file="${bin_name}"
          if [ "${GOOS}" = "windows" ]; then
            bin_file="${bin_name}.exe"
          fi

          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w -X github.com/smcronin/epo-cli/internal/cli.version=${VERSION}" \
            -o "dist/${bin_file}" \
            ./cmd/epo

          archive=""
          if [ "${GOOS}" = "windows" ]; then
            archive="${bin_name}.zip"
            (cd dist && zip -q "${archive}" "${bin_file}")
          else
            archive="${bin_name}.tar.gz"
            (cd dist && tar -czf "${archive}" "${bin_file}")
          fi

          (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          rm -f "dist/${bin_file}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble Checksums
        run: |
          set -euo pipefail
          find dist -type f -name "*.sha256" -print0 | xargs -0 cat | sort > dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
